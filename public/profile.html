<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop — Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
  <script src="js/layout.js"></script>
</head>
<body data-page="profile">

<div id="__main" class="main-content">
  <div class="topbar">
    <span class="topbar-title">Profile & Settings</span>
    <div class="topbar-actions"></div>
  </div>
  <div class="page-wrap">
    <div id="alert" class="alert" style="display:none;"></div>
<div class="container" style="max-width:640px">
  <div class="page-header">
    <h1>Profile & Settings</h1>
  </div>

  

  <div class="card mb-3">
    <div class="card-body">
      <div class="flex items-center gap-3 mb-3">
        <div id="avatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.75rem;font-weight:700;flex-shrink:0"></div>
        <div>
          <h2 id="profile-name"></h2>
          <p class="text-muted" id="profile-email"></p>
          <span class="badge badge-primary" id="profile-role"></span>
        </div>
      </div>

      <form onsubmit="handleUpdate(event)">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="f-name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="f-email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" id="f-phone" class="form-control" placeholder="+1 555 000 0000">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
          <div class="form-group">
            <label class="form-label">City</label>
            <input type="text" id="f-city" class="form-control" placeholder="New York">
          </div>
          <div class="form-group">
            <label class="form-label">Country</label>
            <input type="text" id="f-country" class="form-control" placeholder="USA">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Additional Info</label>
          <textarea id="f-info" class="form-control" rows="2" placeholder="Frequent traveler, photographer..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">New Password <span class="text-muted">(leave blank to keep current)</span></label>
          <input type="password" id="f-password" class="form-control" placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h3 class="mb-2">Trip Summary</h3>
      <div class="grid grid-3" id="trip-stats"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="card mb-3" id="admin-card" style="display:none;border:1.5px solid #ede9ff">
    <div class="card-body">
      <h3 style="color:#6c63ff;margin-bottom:0.5rem">Admin Access</h3>
      <p class="text-muted mb-2">Manage users, view analytics, and platform stats.</p>
      <a href="admin.html" class="btn btn-primary">Open Admin Panel</a>
    </div>
  </div>

  <div class="card" style="border:1.5px solid #fee2e2">
    <div class="card-body">
      <h3 style="color:#ef4444;margin-bottom:0.5rem">Danger Zone</h3>
      <p class="text-muted mb-2">Logging out will end your current session.</p>
      <button class="btn btn-danger" onclick="_layoutLogout()">Logout</button>
    </div>
  </div>
</div>


<script>
  let currentUser;

  (async () => {
    const user = await checkAuth();
    if (!user) return;
    currentUser = user;
    setNavUser(user);

    document.getElementById('avatar').textContent        = user.name.charAt(0).toUpperCase();
    document.getElementById('profile-name').textContent  = user.name;
    document.getElementById('profile-email').textContent = user.email;
    document.getElementById('profile-role').textContent  = user.role;
    if (user.role === 'admin') document.getElementById('admin-card').style.display = 'block';
    const profileData = await API.get('/api/auth/me');
    const fullUser = profileData.user || user;
    document.getElementById('f-name').value    = fullUser.name;
    document.getElementById('f-email').value   = fullUser.email;
    document.getElementById('f-phone').value   = fullUser.phone || '';
    document.getElementById('f-city').value    = fullUser.city_name || '';
    document.getElementById('f-country').value = fullUser.country_name || '';
    document.getElementById('f-info').value    = fullUser.additional_info || '';

    const tripsData = await API.get('/api/trips');
    const ongoing   = (tripsData.ongoing   || []).length;
    const upcoming  = (tripsData.upcoming  || []).length;
    const completed = (tripsData.completed || []).length;
    document.getElementById('trip-stats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${ongoing}</div><div class="stat-label">Ongoing</div></div>
      <div class="stat-card"><div class="stat-value">${upcoming}</div><div class="stat-label">Upcoming</div></div>
      <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Completed</div></div>`;
  })();

  async function handleUpdate(e) {
    e.preventDefault();
    const data = await API.put('/api/auth/profile', {
      name:            document.getElementById('f-name').value,
      email:           document.getElementById('f-email').value,
      phone:           document.getElementById('f-phone').value || null,
      city_name:       document.getElementById('f-city').value || null,
      country_name:    document.getElementById('f-country').value || null,
      additional_info: document.getElementById('f-info').value || null,
      password:        document.getElementById('f-password').value || null
    });
    if (data.error) return showAlert(data.error);
    document.getElementById('profile-name').textContent = document.getElementById('f-name').value;
    document.getElementById('avatar').textContent       = document.getElementById('f-name').value.charAt(0).toUpperCase();
    showAlert('Profile updated', 'success');
  }
</script>
  </div>
</div>
</body>
