<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop — Explore Cities</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/layout.js"></script>
</head>
<body data-page="cities">

<div id="__main" class="main-content">
  <div class="topbar">
    <span class="topbar-title">Explore Cities</span>
    <div class="topbar-actions"></div>
  </div>
  <div class="page-wrap">
    <div id="alert" class="alert" style="display:none;"></div>
<div class="container">
  <div class="page-header">
    <h1>Explore Cities</h1>
    <p>Discover destinations around the world</p>
  </div>

  

  <div class="search-bar-wrap">
    <input type="text" id="search-q" class="form-control" placeholder="Search cities..." oninput="debounceSearch()">
    <select id="country-filter" class="form-control" style="max-width:200px" onchange="loadCities()">
      <option value="">All Countries</option>
    </select>
  </div>

  <div id="city-grid" class="grid grid-4"><div class="spinner"></div></div>
</div>

<div id="city-modal" class="modal-overlay" style="display:none;">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="modal-city-name">City</h3>
      <button class="modal-close" onclick="closeCityModal()">✕</button>
    </div>
    <div class="modal-body">
      <img id="modal-city-img" src="" style="width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:1rem" alt="">
      <p id="modal-city-desc" class="text-muted mb-2"></p>
      <div class="flex gap-2 mb-2">
        <span id="modal-city-country" class="badge badge-gray"></span>
        <span id="modal-city-cost" class="badge badge-primary"></span>
        <span id="modal-city-pop" class="badge badge-success"></span>
      </div>
      <h3 class="mb-2 mt-2">Activities in this City</h3>
      <div id="modal-activities"><div class="spinner"></div></div>
    </div>
  </div>
</div>


<script>
  let searchTimer;

  (async () => {
    const user = await checkAuth();
    if (!user) return;
    setNavUser(user);

    const countriesData = await API.get('/api/cities/countries');
    const sel = document.getElementById('country-filter');
    (countriesData.countries || []).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.country_id;
      opt.textContent = c.country_name;
      sel.appendChild(opt);
    });

    const preselect = getParam('city_id');
    const preq = getParam('q');
    if (preq) document.getElementById('search-q').value = preq;
    await loadCities();
    if (preselect) openCityModal(parseInt(preselect));
  })();

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadCities, 350);
  }

  async function loadCities() {
    const q = document.getElementById('search-q').value.trim();
    const country = document.getElementById('country-filter').value;
    let url = '/api/cities?limit=24';
    if (q) url += `&q=${encodeURIComponent(q)}`;
    if (country) url += `&country_id=${country}`;

    const data = await API.get(url);
    const el = document.getElementById('city-grid');
    const cities = data.cities || [];
    if (cities.length === 0) {
      el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h3>No cities found</h3></div>';
      return;
    }
    el.innerHTML = cities.map(c => `
      <div class="card city-card" onclick="openCityModal(${c.city_id})">
        <img class="city-card-img" src="${c.image_url || ''}" alt="${c.city_name}" onerror="this.style.background='linear-gradient(135deg,#6c63ff,#a78bfa)'">
        <div class="card-body" style="padding:0.9rem 1rem">
          <h3 style="font-size:0.95rem">${c.city_name}</h3>
          <p class="city-card-cost">${c.country_name}</p>
          <p class="city-card-cost">~$${c.avg_daily_cost}/day · ★ ${c.popularity_score}</p>
        </div>
      </div>`).join('');
  }

  async function openCityModal(cityId) {
    document.getElementById('city-modal').style.display = 'flex';
    document.getElementById('modal-activities').innerHTML = '<div class="spinner"></div>';

    const cityData = await API.get(`/api/cities/${cityId}`);
    const c = cityData.city;
    document.getElementById('modal-city-name').textContent    = c.city_name;
    document.getElementById('modal-city-desc').textContent    = c.description || '';
    document.getElementById('modal-city-img').src             = c.image_url || '';
    document.getElementById('modal-city-country').textContent = c.country_name;
    document.getElementById('modal-city-cost').textContent    = `~$${c.avg_daily_cost}/day`;
    document.getElementById('modal-city-pop').textContent     = `★ ${c.popularity_score}`;

    const actsData = await API.get(`/api/activities?city_id=${cityId}&limit=10`);
    const acts = actsData.activities || [];
    document.getElementById('modal-activities').innerHTML = acts.length === 0
      ? '<p class="text-muted">No activities listed</p>'
      : acts.map(a => `<div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid #f1f0ff">
          <div>
            <span class="activity-chip">${a.category_name}</span>
            <strong style="margin-left:0.4rem;font-size:0.9rem">${a.activity_name}</strong>
          </div>
          <span class="text-muted" style="font-size:0.85rem">${fmtMoney(a.estimated_cost)} · ${a.estimated_duration_minutes}min</span>
        </div>`).join('');
  }

  function closeCityModal() {
    document.getElementById('city-modal').style.display = 'none';
  }
</script>
  </div>
</div>
</body>
