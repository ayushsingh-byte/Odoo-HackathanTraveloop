<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%); }
    .auth-box { background: #fff; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo h1 { color: #6c63ff; font-size: 2rem; font-weight: 800; }
    .auth-logo p { color: #6b7280; font-size: 0.9rem; }
    .auth-tabs { display: flex; margin-bottom: 1.75rem; border-bottom: 2px solid #e5e7eb; }
    .auth-tabs button { flex: 1; padding: 0.6rem; border: none; background: none; font-size: 0.95rem; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .auth-tabs button.active { color: #6c63ff; border-bottom-color: #6c63ff; }
    .auth-footer { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <h1>✈ Traveloop</h1>
      <p>Plan your perfect journey</p>
    </div>
    <div id="alert" class="alert" style="display:none;"></div>
    <div class="auth-tabs">
      <button class="active" onclick="showTab('login')">Login</button>
      <button onclick="showTab('register')">Register</button>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Login</button>
    </form>

    <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script>
    (async () => {
      const data = await fetch('/api/auth/me', { credentials: 'same-origin' }).then(r => r.json()).catch(() => null);
      if (data && data.user) window.location.href = 'dashboard.html';
    })();

    function showTab(tab) {
      document.querySelectorAll('.auth-tabs button').forEach((b, i) => {
        b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const data = await API.post('/api/auth/login', {
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      });
      if (data.error) return showAlert(data.error);
      window.location.href = 'dashboard.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const data = await API.post('/api/auth/register', {
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value
      });
      if (data.error) return showAlert(data.error);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
