<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop — Plan a New Trip</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="/dashboard.html" class="navbar-brand">✈ Traveloop</a>
    <ul class="navbar-nav">
      <li><a href="/dashboard.html">Home</a></li>
      <li><a href="/trips.html">My Trips</a></li>
      <li><a href="/cities.html">Explore</a></li>
      <li><a href="/profile.html" id="nav-user">Profile</a></li>
      <li><button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container" style="max-width:640px">
  <div class="page-header">
    <h1>Plan a New Trip</h1>
    <p>Give your adventure a name and dates to get started</p>
  </div>

  <div id="alert" class="alert" style="display:none;"></div>

  <div class="card">
    <div class="card-body">
      <form id="trip-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label">Trip Title *</label>
          <input type="text" id="title" class="form-control" placeholder="Europe Summer Adventure" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="description" class="form-control" rows="3" placeholder="A quick overview of your trip..."></textarea>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" id="start_date" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">End Date</label>
            <input type="date" id="end_date" class="form-control">
          </div>
        </div>
        <div class="grid grid-2">
          <div class="form-group">
            <label class="form-label">Total Budget</label>
            <input type="number" id="total_budget" class="form-control" placeholder="5000" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Currency</label>
            <select id="currency" class="form-control">
              <option>USD</option><option>EUR</option><option>GBP</option>
              <option>JPY</option><option>INR</option><option>AUD</option>
              <option>SGD</option><option>THB</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Visibility</label>
          <select id="visibility" class="form-control">
            <option value="private">Private</option>
            <option value="link_only">Anyone with link</option>
            <option value="public">Public</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Cover Image URL (optional)</label>
          <input type="url" id="cover_image" class="form-control" placeholder="https://...">
        </div>
        <div class="flex gap-2 mt-3">
          <a href="/trips.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Create Trip →</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  (async () => {
    const user = await checkAuth();
    if (!user) return;
    setNavUser(user);
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('start_date').min = today;
    document.getElementById('end_date').min = today;
  })();

  async function handleSubmit(e) {
    e.preventDefault();
    const start = document.getElementById('start_date').value;
    const end = document.getElementById('end_date').value;
    if (start && end && end < start) return showAlert('End date must be after start date');

    const data = await API.post('/api/trips', {
      title: document.getElementById('title').value,
      description: document.getElementById('description').value,
      start_date: start || null,
      end_date: end || null,
      total_budget: parseFloat(document.getElementById('total_budget').value) || 0,
      currency: document.getElementById('currency').value,
      visibility: document.getElementById('visibility').value,
      cover_image: document.getElementById('cover_image').value || null
    });

    if (data.error) return showAlert(data.error);
    window.location.href = `/trip-builder.html?id=${data.trip_id}`;
  }

  async function logout() {
    await API.post('/api/auth/logout', {});
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
