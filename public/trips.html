<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traveloop — My Trips</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="/dashboard.html" class="navbar-brand">✈ Traveloop</a>
    <ul class="navbar-nav">
      <li><a href="/dashboard.html">Home</a></li>
      <li><a href="/trips.html" class="active">My Trips</a></li>
      <li><a href="/cities.html">Explore</a></li>
      <li><a href="/profile.html" id="nav-user">Profile</a></li>
      <li><button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header flex items-center justify-between">
    <div>
      <h1>My Trips</h1>
      <p>Manage your travel plans</p>
    </div>
    <a href="/trip-new.html" class="btn btn-primary">+ New Trip</a>
  </div>

  <div id="alert" class="alert" style="display:none;"></div>

  <div class="tab-bar">
    <button class="active" onclick="showTab('ongoing')">Ongoing</button>
    <button onclick="showTab('upcoming')">Upcoming</button>
    <button onclick="showTab('undated')">Drafts</button>
    <button onclick="showTab('completed')">Completed</button>
  </div>

  <div id="trip-list" class="grid grid-3"><div class="spinner"></div></div>
</div>

<div id="delete-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3>Delete Trip</h3>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>This will permanently delete the trip and all its data. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  let allTrips = { ongoing: [], upcoming: [], completed: [], undated: [] };
  let currentTab = 'ongoing';
  let deleteTarget = null;

  (async () => {
    const user = await checkAuth();
    if (!user) return;
    setNavUser(user);
    await loadTrips();
  })();

  async function loadTrips() {
    const data = await API.get('/api/trips');
    allTrips = data;
    renderTab(currentTab);
  }

  function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-bar button').forEach((b, i) => {
      b.classList.toggle('active', b.textContent.toLowerCase() === tab);
    });
    renderTab(tab);
  }

  function renderTab(tab) {
    const trips = allTrips[tab] || [];
    const el = document.getElementById('trip-list');
    if (trips.length === 0) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <h3>No ${tab} trips</h3>
        <p>${tab === 'upcoming' ? 'Plan your next adventure!' : tab === 'undated' ? 'Trips without dates show here.' : 'Your completed trips will appear here.'}</p>
        <a href="/trip-new.html" class="btn btn-primary mt-2">Plan a Trip</a>
      </div>`;
      return;
    }
    el.innerHTML = trips.map(t => tripCard(t)).join('');
  }

  function tripCard(t) {
    const cover = t.cover_image || `https://picsum.photos/seed/${t.trip_id}/400/200`;
    const spent = t.total_cost || 0;
    const budget = t.total_budget || 0;
    const overBudget = budget > 0 && spent > budget;
    return `<div class="card trip-card">
      <img class="trip-card-cover" src="${cover}" alt="${t.title}"
           onclick="window.location='/trip-view.html?id=${t.trip_id}'"
           onerror="this.style.background='linear-gradient(135deg,#6c63ff,#a78bfa)'">
      <div class="card-body">
        <h3 onclick="window.location='/trip-view.html?id=${t.trip_id}'" style="cursor:pointer">${t.title}</h3>
        <div class="trip-card-meta">
          <span class="badge badge-primary">${t.stop_count} stops</span>
          ${overBudget ? '<span class="badge badge-danger">Over Budget</span>' : ''}
        </div>
        <p class="text-muted mt-1">${fmt(t.start_date)} — ${fmt(t.end_date)}</p>
        <div class="flex gap-1 mt-2">
          <a href="/trip-view.html?id=${t.trip_id}" class="btn btn-secondary btn-sm">View</a>
          <a href="/trip-builder.html?id=${t.trip_id}" class="btn btn-secondary btn-sm">Edit</a>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${t.trip_id}')">Delete</button>
        </div>
      </div>
    </div>`;
  }

  function openDeleteModal(id) {
    deleteTarget = id;
    document.getElementById('delete-modal').style.display = 'flex';
  }

  function closeDeleteModal() {
    deleteTarget = null;
    document.getElementById('delete-modal').style.display = 'none';
  }

  async function confirmDelete() {
    if (!deleteTarget) return;
    const data = await API.del(`/api/trips/${deleteTarget}`);
    closeDeleteModal();
    if (data.error) return showAlert(data.error);
    await loadTrips();
    showAlert('Trip deleted', 'success');
  }

  async function logout() {
    await API.post('/api/auth/logout', {});
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
