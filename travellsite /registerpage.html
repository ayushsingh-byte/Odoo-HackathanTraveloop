<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traveloop Register</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body id="register-page">

<header>
  <div class="logo"><i class="fas fa-globe"></i> TRAVELOOP</div>
  <nav></nav>
  <button class="book-btn"><i class="fas fa-plane"></i> Plane</button>
</header>

<main>
  <div class="hero-text">
    <h1>TRAVELOOP</h1>
    <p>EXPLORE. EXPERIENCE. REMEMBER.</p>
  </div>

  <div class="register-container">
    <div class="photo-upload">
      <span>Photo</span>
    </div>

    <form class="register-form">
      <div class="form-grid">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <input type="email" placeholder="Email Address">
        <input type="tel" placeholder="Phone Number">
        <input type="text" placeholder="City">
        <input type="text" placeholder="Country">
      </div>
      <textarea placeholder="Additional Information ...."></textarea>
      <button type="button" class="register-btn">Register Users</button>
    </form>
    
    <p class="signup">Already have an account? <a href="loginpage.html">Log in</a></p>
  </div>
</main>

</body>
</html>
