<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traveloop Login</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body id="login-page">

<header>
  <div class="logo"><i class="fas fa-globe"></i> TRAVELOOP</div>
  <nav></nav>
  <button class="book-btn"><i class="fas fa-plane"></i> Plan</button>
</header>

<main>
  <div class="hero-text">
    <h1>TRAVELOOP</h1>
    <p>EXPLORE. EXPERIENCE. REMEMBER.</p>
  </div>

  <div class="login-container">

    <h2>Welcome Back</h2>
    <p>Login to continue your journey</p>

    <div class="input-group">
      <i class="far fa-user"></i>
      <input type="text" placeholder="Email or Username">
    </div>

    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" placeholder="Password">
      <i class="far fa-eye show-pwd"></i>
    </div>

    <a href="#" class="forgot">Forgot Password?</a>

    <button class="login-btn">Login</button>

    <div class="divider">
      <span>or continue with</span>
    </div>

    <div class="socials">
      <button class="social-btn">
        <!-- Google SVG -->
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">

              <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/>

            </g>
        </svg>
      </button>
      <button class="social-btn"><i class="fab fa-facebook" style="color: #1877f2;"></i></button>
      <button class="social-btn"><i class="fab fa-apple" style="color: white;"></i></button>
    </div>

    <p class="signup">Don't have an account? <a href="registerpage.html">Sign up</a></p>
  </div>
</main>

</body>
</html>
